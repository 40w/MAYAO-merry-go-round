!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAYAO · Shadow Casting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loader" id="loader"><div class="loader-text">KINDLING THE LIGHT</div></div>
    <div id="canvas-container"></div>

    <!-- Legend -->
    <div class="legend" id="legend">
        <div class="legend-item"><svg class="legend-shape" viewBox="0 0 20 20"><circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="1"/></svg>Text</div>
        <div class="legend-item"><svg class="legend-shape" viewBox="0 0 20 20"><polygon points="10,3 17,10 10,17 3,10" fill="none" stroke="currentColor" stroke-width="1"/></svg>Audio</div>
        <div class="legend-item"><svg class="legend-shape" viewBox="0 0 20 20"><rect x="4" y="4" width="12" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1"/></svg>Image</div>
        <div class="legend-item"><svg class="legend-shape" viewBox="0 0 20 20"><circle cx="10" cy="10" r="5" fill="none" stroke="currentColor" stroke-width="1"/><circle cx="10" cy="10" r="1.5" fill="currentColor"/></svg>Video</div>
        <div class="legend-item"><svg class="legend-shape" viewBox="0 0 20 20"><path d="M10 3 Q13 8 10 13 Q7 8 10 3" fill="none" stroke="currentColor" stroke-width="1"/></svg>Wish</div>
    </div>

    <!-- Corner Triggers -->
    <div class="corner-trigger top-left" onclick="openQRModal()" title="Scan QR to Leave a Message">
        <div class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#262425" stroke-width="1"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h7v7h-7z"/><path d="M17 14v7M14 17h7"/></svg>
        </div>
    </div>
    <div class="corner-trigger top-left-refresh" onclick="location.reload()" title="Refresh">
        <div class="icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#262425" stroke-width="1"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </div>
    </div>
    <div class="corner-trigger top-left-demo" id="demoBtn" onclick="toggleDemoMode()" title="Demo Mode">
        <div class="icon">
            <svg id="demoIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
    </div>

    <!-- Bottom Info -->
    <div class="bottom-info">
        <h1>SHADOW CASTING</h1>
        <p>INTERACTIVE MESSAGE EXHIBITION · <span id="cutoutCount">0</span> CUTOUTS</p>
    </div>
    <div class="hint">Click cutouts to read · Drag to rotate</div>

    <!-- Detail Modal -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-backdrop" onclick="closeDetailModal()"></div>
        <div class="detail-content">
            <button class="detail-close" onclick="closeDetailModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#262425" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
            <div class="detail-body" id="detailBody"></div>
        </div>
    </div>

    <!-- QR Modal -->
    <div class="qr-modal" id="qrModal">
        <div class="close-modal" onclick="closeQRModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#262425" stroke-width="1"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </div>
        <div class="qr-box">
            <h3>SCAN TO LEAVE A MESSAGE</h3>
            <img src="submitQRCode.png" class="qr-img" alt="QR Code">
            <p>Open camera and scan, or visit<br><a href="submit.html" target="_blank" style="color:#262425;text-decoration:underline;font-weight:500;">Submit Page</a></p>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
